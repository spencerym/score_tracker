<!DOCTYPE html>
<html>
<head>
  <title>International Trap Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #eef3ff;
      margin: 0;
      padding: 10px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 14px;
      border-radius: 16px;
    }

    h1 {
      font-size: 22px;
      text-align: center;
      margin: 8px 0 16px;
    }

    h2 {
      font-size: 20px;
      text-align: center;
      margin: 12px 0;
    }

    h3 {
      font-size: 17px;
      text-align: center;
      margin: 8px 0;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      background: #222;
      color: white;
      border: none;
      font-weight: bold;
      touch-action: manipulation;
    }

    button:disabled {
      background: #999;
      color: #eee;
      opacity: 0.7;
    }

    .shooter-row {
      background: #f1f4ff;
      padding: 12px;
      border-radius: 14px;
      margin: 10px 0;
    }

    .current-box {
      background: #eef6ff;
      padding: 14px;
      border-radius: 16px;
      margin-top: 12px;
      text-align: center;
    }

    .target-note {
      font-size: 13px;
      color: #444;
      margin: 8px 0;
    }

    .machine-area {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 8px 0;
    }

    .machine-column {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .direction-count {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 4px;
      color: #333;
      text-align: center;
    }

    .machine-column button {
      margin: 0;
      min-height: 52px;
      background: #6b87c7;
    }

    .machine-column button.selected {
      background: #062d91;
      outline: 4px solid rgba(6, 45, 145, 0.25);
      transform: scale(1.03);
    }

    .machine-column button.locked {
      background: #999;
    }

    .result-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .result-buttons button {
      margin: 0;
      min-height: 52px;
    }

    .hit { background: #26834a; }
    .miss { background: #a83232; }
    .double { background: #7a42c8; }

    .control-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .back-button { background: #b35b00; }
    .end-button { background: #111; }

    .export-buttons {
      margin: 18px 0 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .export-image { background: #26834a; }
    .export-pdf { background: #7a42c8; }

    .reset-button {
      background: #3568d4;
      font-size: 18px;
      padding: 14px;
    }

    .message {
      min-height: 22px;
      color: #a83232;
      font-weight: bold;
      font-size: 14px;
      text-align: center;
      margin: 6px 0;
    }

    .score-symbol {
      font-size: 15px;
      font-weight: bold;
      line-height: 1;
      display: block;
    }

    .double-symbol {
      font-size: 18px;
    }

    .hit-symbol { color: #26834a; }
    .miss-symbol { color: #a83232; }
    .double-symbol { color: #7a42c8; }

    .summary-table-wrap,
    .scoresheet-wrap {
      width: 100%;
      overflow-x: auto;
      margin-top: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 7px;
      text-align: center;
    }

    th {
      background: #222;
      color: white;
    }

    .hidden { display: none; }

    .log-section {
      margin-top: 18px;
      padding: 10px;
      background: #fafafa;
      border-radius: 14px;
    }

    .scoresheet-cell {
      text-align: center;
      min-width: 175px;
    }

    .shot-group {
      display: grid;
      grid-template-columns: repeat(5, 22px);
      justify-content: center;
      gap: 2px;
      margin: 3px auto;
      min-height: 25px;
    }

    .scorecell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 22px;
      min-height: 25px;
    }

    .machine-number {
      font-size: 13px;
      font-weight: normal;
      line-height: 1;
    }

    .empty-scorecell {
      width: 22px;
      min-height: 25px;
    }

    .final-card {
      background: #f1f4ff;
      padding: 12px;
      border-radius: 14px;
      margin-top: 10px;
    }

    .final-symbol-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .final-symbol-item {
      font-weight: bold;
      text-align: center;
    }

    .analysis-box {
      background: white;
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
      text-align: left;
      font-size: 14px;
      line-height: 1.4;
    }

    .analysis-box p {
      margin: 5px 0;
    }

    .analysis-divider {
      border: none;
      border-top: 1px solid #ccc;
      margin: 10px 0;
    }

    .analysis-section-space {
      height: 6px;
    }

    @media (max-width: 480px) {
      body {
        padding: 6px;
      }

      .container {
        padding: 10px;
        border-radius: 12px;
      }

      h1 { font-size: 20px; }
      h2 { font-size: 18px; }

      input, select, button {
        font-size: 15px;
        padding: 11px;
      }

      .machine-area,
      .result-buttons,
      .export-buttons {
        gap: 6px;
      }

      .machine-column button,
      .result-buttons button {
        font-size: 14px;
        min-height: 48px;
      }

      th, td {
        padding: 6px;
        font-size: 13px;
      }

      .scoresheet-cell {
        min-width: 165px;
      }
    }
  </style>
</head>

<body>
<div class="container">
  <h1>International Trap Score Tracker</h1>

  <div id="setup">
    <h2>Set Up Shooters</h2>

    <label>Number of shooters:</label>
    <input type="number" id="shooterCount" min="1" max="6" value="3">
    <button onclick="createShooterInputs()">Create Shooters</button>

    <p class="message" id="stationWarning"></p>

    <div id="shooterInputs"></div>

    <button onclick="startRound()">Start Round</button>
  </div>

  <div id="scoreArea" class="hidden">
    <h2>Round Tracker</h2>

    <div class="current-box">
      <h3 id="currentShooterText"></h3>
      <p id="currentShotText"></p>

      <p class="target-note">
        Each shooter can receive 2 right, 1 straight, and 2 left targets from each station.
      </p>

      <div id="machineButtons" class="machine-area"></div>

      <div class="result-buttons">
        <button class="hit" onclick="recordShot('Hit')">/ Hit</button>
        <button class="miss" onclick="recordShot('Miss')">○ Miss</button>
        <button class="double" onclick="recordShot('Double')">• Double</button>
      </div>

      <p class="message" id="actionMessage"></p>

      <div class="control-buttons">
        <button class="back-button" onclick="undoLastShot()">Back</button>
        <button class="end-button" onclick="endRound()">End Round</button>
      </div>
    </div>

    <div class="summary-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Shooter</th>
            <th>Station</th>
            <th>Shots</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="scoreTable"></tbody>
      </table>
    </div>

    <div id="allLogs"></div>
  </div>

  <div id="finalPage" class="hidden">
    <h2>Final Scoresheet</h2>
    <div id="finalLogs"></div>

    <div class="export-buttons">
      <button class="export-image" onclick="exportScoresheetImage()">Export Image</button>
      <button class="export-pdf" onclick="exportScoresheetPDF()">Export PDF</button>
    </div>

    <div class="analysis-section-space"></div>

    <h2>Results and Analysis</h2>
    <div id="finalResults"></div>

    <button class="reset-button" onclick="resetApp()">Reset</button>
  </div>
</div>

<script>
let shooters = [];
let originalOrder = [];
let currentShooterIndex = 0;
let selectedMachine = null;
let selectedDirection = null;
let history = [];

const stationMachines = {
  1: [
    { number: 1, direction: "Right" },
    { number: 2, direction: "Straight" },
    { number: 3, direction: "Left" }
  ],
  2: [
    { number: 4, direction: "Right" },
    { number: 5, direction: "Straight" },
    { number: 6, direction: "Left" }
  ],
  3: [
    { number: 7, direction: "Right" },
    { number: 8, direction: "Straight" },
    { number: 9, direction: "Left" }
  ],
  4: [
    { number: 10, direction: "Right" },
    { number: 11, direction: "Straight" },
    { number: 12, direction: "Left" }
  ],
  5: [
    { number: 13, direction: "Right" },
    { number: 14, direction: "Straight" },
    { number: 15, direction: "Left" }
  ]
};

const directionLimits = {
  Right: 2,
  Straight: 1,
  Left: 2
};

function setMessage(text) {
  document.getElementById("actionMessage").textContent = text || "";
}

function createShooterInputs() {
  const count = Number(document.getElementById("shooterCount").value);
  const div = document.getElementById("shooterInputs");
  div.innerHTML = "";

  for (let i = 0; i < count; i++) {
    let defaultStation = i + 1;

    if (i === 5) {
      defaultStation = 1;
    }

    let options = "";

    for (let s = 1; s <= 5; s++) {
      const selected = s === defaultStation ? "selected" : "";
      options += `<option value="${s}" ${selected}>Station ${s}</option>`;
    }

    div.insertAdjacentHTML("beforeend", `
      <div class="shooter-row">
        <label>Shooter ${i + 1} name:</label>
        <input type="text" id="name${i}" value="Shooter ${i + 1}">

        <label>Starting station:</label>
        <select id="station${i}" onchange="checkStations()">
          ${options}
        </select>
      </div>
    `);
  }

  checkStations();
}

function makeCounts() {
  return {
    1: { Right: 0, Straight: 0, Left: 0 },
    2: { Right: 0, Straight: 0, Left: 0 },
    3: { Right: 0, Straight: 0, Left: 0 },
    4: { Right: 0, Straight: 0, Left: 0 },
    5: { Right: 0, Straight: 0, Left: 0 }
  };
}

function checkStations() {
  const count = Number(document.getElementById("shooterCount").value);
  const stationOwner = {};
  let invalid = false;

  for (let i = 0; i < count; i++) {
    const station = document.getElementById("station" + i).value;

    if (stationOwner[station] !== undefined) {
      const first = stationOwner[station];
      const second = i;
      const allowed = count === 6 && (first === 5 || second === 5);

      if (!allowed) invalid = true;
    } else {
      stationOwner[station] = i;
    }
  }

  document.getElementById("stationWarning").textContent =
    invalid ? "Only shooter 6 can share a starting station." : "";
}

function startRound() {
  const count = Number(document.getElementById("shooterCount").value);
  const stationOwner = {};

  shooters = [];
  history = [];
  currentShooterIndex = 0;

  for (let i = 0; i < count; i++) {
    const station = Number(document.getElementById("station" + i).value);

    if (stationOwner[station] !== undefined) {
      const first = stationOwner[station];
      const second = i;
      const allowed = count === 6 && (first === 5 || second === 5);

      if (!allowed) {
        document.getElementById("stationWarning").textContent =
          "Only shooter 6 can share a starting station.";
        return;
      }
    } else {
      stationOwner[station] = i;
    }

    shooters.push({
      name: document.getElementById("name" + i).value,
      startStation: station,
      station: station,
      shooterNumber: i + 1,
      shots: 0,
      hits: 0,
      misses: 0,
      doubles: 0,
      targetCounts: makeCounts(),
      log: []
    });
  }

  shooters.sort((a, b) => {
    const aKey = a.shooterNumber === 6 ? 6 : a.startStation;
    const bKey = b.shooterNumber === 6 ? 6 : b.startStation;
    return aKey - bKey;
  });

  originalOrder = shooters;

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("scoreArea").classList.remove("hidden");
  document.getElementById("finalPage").classList.add("hidden");

  updateDisplay();
}

function updateDisplay() {
  selectedMachine = null;
  selectedDirection = null;
  setMessage("");

  if (shooters.every(s => s.shots >= 25)) {
    endRound();
    return;
  }

  while (shooters[currentShooterIndex].shots >= 25) {
    currentShooterIndex++;

    if (currentShooterIndex >= shooters.length) currentShooterIndex = 0;
  }

  const shooter = shooters[currentShooterIndex];

  document.getElementById("currentShooterText").textContent =
    shooter.name + " on Station " + shooter.station;

  document.getElementById("currentShotText").textContent =
    "Shot " + (shooter.shots + 1) + " of 25";

  createMachineButtons(shooter);
  updateScoreTable();
  updateLogs();
}

function createMachineButtons(shooter) {
  const div = document.getElementById("machineButtons");
  div.innerHTML = "";

  const station = shooter.station;
  const counts = shooter.targetCounts[station];

  stationMachines[station].forEach(m => {
    const column = document.createElement("div");
    column.className = "machine-column";

    const label = document.createElement("div");
    label.className = "direction-count";
    label.textContent =
      m.direction + " " + counts[m.direction] + "/" + directionLimits[m.direction];

    const button = document.createElement("button");
    button.textContent = "Machine " + m.number;

    const locked = counts[m.direction] >= directionLimits[m.direction];

    if (locked) {
      button.disabled = true;
      button.classList.add("locked");
    }

    button.onclick = function() {
      selectedMachine = m.number;
      selectedDirection = m.direction;
      setMessage("");

      document.querySelectorAll(".machine-column button").forEach(b => {
        b.classList.remove("selected");
      });

      button.classList.add("selected");
    };

    column.appendChild(label);
    column.appendChild(button);
    div.appendChild(column);
  });
}

function recordShot(result) {
  const shooter = shooters[currentShooterIndex];

  if (selectedMachine === null) {
    setMessage("Select a machine first.");
    return;
  }

  history.push({
    shooters: JSON.stringify(shooters),
    currentShooterIndex: currentShooterIndex
  });

  shooter.shots++;

  if (result === "Hit") shooter.hits++;
  if (result === "Miss") shooter.misses++;
  if (result === "Double") shooter.doubles++;

  shooter.targetCounts[shooter.station][selectedDirection]++;

  shooter.log.push({
    machine: selectedMachine,
    direction: selectedDirection,
    result: result
  });

  shooter.station++;

  if (shooter.station > 5) shooter.station = 1;

  currentShooterIndex++;

  if (currentShooterIndex >= shooters.length) currentShooterIndex = 0;

  updateDisplay();
}

function undoLastShot() {
  if (history.length === 0) {
    setMessage("No shot to undo.");
    return;
  }

  const last = history.pop();

  shooters = JSON.parse(last.shooters);
  originalOrder = shooters;
  currentShooterIndex = last.currentShooterIndex;

  updateDisplay();
}

function getSymbol(result) {
  if (result === "Hit") return `<span class="score-symbol hit-symbol">/</span>`;
  if (result === "Miss") return `<span class="score-symbol miss-symbol">○</span>`;
  return `<span class="score-symbol double-symbol">•</span>`;
}

function updateScoreTable() {
  const tbody = document.getElementById("scoreTable");
  tbody.innerHTML = "";

  originalOrder.forEach(s => {
    tbody.insertAdjacentHTML("beforeend", `
      <tr>
        <td>${s.name}</td>
        <td>${s.station}</td>
        <td>${s.shots}/25</td>
        <td>${s.hits + s.doubles}</td>
      </tr>
    `);
  });
}

function makeShotCell(entry) {
  if (!entry) return `<span class="empty-scorecell"></span>`;

  return `
    <span class="scorecell">
      ${getSymbol(entry.result)}
      <span class="machine-number">${entry.machine}</span>
    </span>
  `;
}

function makeScoresheet(title) {
  let rows = "";

  originalOrder.forEach(s => {
    let html = "";
    const groupsToShow = Math.ceil(s.log.length / 5);

    for (let group = 0; group < groupsToShow; group++) {
      html += `<div class="shot-group">`;

      for (let slot = 0; slot < 5; slot++) {
        const index = group * 5 + slot;
        html += makeShotCell(index < s.log.length ? s.log[index] : null);
      }

      html += `</div>`;
    }

    rows += `
      <tr>
        <td><strong>${s.name}</strong></td>
        <td class="scoresheet-cell">${html || "No shots yet"}</td>
        <td><strong>${s.hits + s.doubles}</strong></td>
      </tr>
    `;
  });

  return `
    <div class="log-section">
      ${title ? `<h2>${title}</h2>` : ""}
      <div class="scoresheet-wrap">
        <table>
          <thead>
            <tr>
              <th>Shooter</th>
              <th>Scoresheet</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function updateLogs() {
  document.getElementById("allLogs").innerHTML = makeScoresheet("Scoresheet");
}

function makeFinalSymbolSummary(s) {
  return `
    <div class="final-symbol-row">
      <div class="final-symbol-item">
        <span class="score-symbol hit-symbol">/</span>
        Hits: ${s.hits}
      </div>
      <div class="final-symbol-item">
        <span class="score-symbol miss-symbol">○</span>
        Misses: ${s.misses}
      </div>
      <div class="final-symbol-item">
        <span class="score-symbol double-symbol">•</span>
        Doubles: ${s.doubles}
      </div>
    </div>
  `;
}

function countByEntries(entries) {
  const directionCounts = {};
  const machineCounts = {};

  entries.forEach(entry => {
    directionCounts[entry.direction] = (directionCounts[entry.direction] || 0) + 1;
    machineCounts[entry.machine] = (machineCounts[entry.machine] || 0) + 1;
  });

  return { directionCounts, machineCounts };
}

function findMaxItems(counts) {
  let max = 0;

  Object.values(counts).forEach(value => {
    if (value > max) max = value;
  });

  if (max === 0) return { max: 0, items: [] };

  return {
    max: max,
    items: Object.keys(counts).filter(key => counts[key] === max)
  };
}

function formatAnalysis(directionData, machineData) {
  const directionText =
    directionData.max === 0 ? "None" : directionData.items.join(", ");

  const machineText =
    machineData.max === 0 ? "None" : machineData.items.join(", ");

  return `
    <p>Most Missed Direction: ${directionText}</p>
    <p>Most Missed Machine: ${machineText}</p>
  `;
}

function makeShooterAnalysis(s) {
  const regularMissEntries = s.log.filter(entry => entry.result === "Miss");
  const singleShotMissEntries = s.log.filter(entry => entry.result === "Miss" || entry.result === "Double");

  const regularCounts = countByEntries(regularMissEntries);
  const singleShotCounts = countByEntries(singleShotMissEntries);

  const regularDirectionMax = findMaxItems(regularCounts.directionCounts);
  const regularMachineMax = findMaxItems(regularCounts.machineCounts);

  const singleDirectionMax = findMaxItems(singleShotCounts.directionCounts);
  const singleMachineMax = findMaxItems(singleShotCounts.machineCounts);

  return `
    <div class="analysis-box">
      <p><strong>Analysis</strong></p>
      ${formatAnalysis(regularDirectionMax, regularMachineMax)}

      <hr class="analysis-divider">

      <p><strong>Single Shot Analysis</strong></p>
      ${formatAnalysis(singleDirectionMax, singleMachineMax)}
    </div>
  `;
}

function endRound() {
  document.getElementById("scoreArea").classList.add("hidden");
  document.getElementById("finalPage").classList.remove("hidden");

  document.getElementById("finalLogs").innerHTML = makeScoresheet("");

  let html = "";

  originalOrder.forEach(s => {
    html += `
      <div class="final-card">
        <h3>${s.name}</h3>
        <p><strong>Starting Station:</strong> ${s.startStation}</p>
        <p><strong>Final Score:</strong> ${s.hits + s.doubles}</p>
        ${makeFinalSymbolSummary(s)}
        ${makeShooterAnalysis(s)}
      </div>
    `;
  });

  document.getElementById("finalResults").innerHTML = html;
}

async function exportScoresheetImage() {
  const element = document.getElementById("finalLogs");

  const canvas = await html2canvas(element, {
    backgroundColor: "#ffffff",
    scale: 3
  });

  const link = document.createElement("a");
  link.download = "trap-scoresheet.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

async function exportScoresheetPDF() {
  const element = document.getElementById("finalLogs");

  const canvas = await html2canvas(element, {
    backgroundColor: "#ffffff",
    scale: 3
  });

  const imgData = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({
    orientation: "portrait",
    unit: "mm",
    format: "a4"
  });

  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const imgWidth = pageWidth - 20;
  const imgHeight = canvas.height * imgWidth / canvas.width;

  if (imgHeight <= pageHeight - 20) {
    pdf.addImage(imgData, "PNG", 10, 10, imgWidth, imgHeight);
  } else {
    let heightLeft = imgHeight;
    let position = 10;

    pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
    heightLeft -= pageHeight - 20;

    while (heightLeft > 0) {
      position -= pageHeight - 20;
      pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
      heightLeft -= pageHeight - 20;
    }
  }

  pdf.save("trap-scoresheet.pdf");
}

function resetApp() {
  shooters = [];
  originalOrder = [];
  currentShooterIndex = 0;
  selectedMachine = null;
  selectedDirection = null;
  history = [];

  document.getElementById("finalPage").classList.add("hidden");
  document.getElementById("scoreArea").classList.add("hidden");
  document.getElementById("setup").classList.remove("hidden");

  createShooterInputs();
}

createShooterInputs();
</script>
</body>
</html>
