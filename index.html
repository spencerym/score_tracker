<!DOCTYPE html>
<html lang="en">
<head>
  <title>Olympic Trap Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      touch-action: manipulation;
    }

    body {
      font-family: Arial, sans-serif;
      background: #eef3ff;
      margin: 0;
      padding: 10px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 14px;
      border-radius: 16px;
      position: relative;
    }

    .settings-area {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
    }

    .settings-button {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 50%;
      font-size: 20px;
      background: #222;
    }

    .settings-menu {
      position: absolute;
      right: 0;
      top: 46px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 10px;
      width: 170px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }

    .settings-menu label {
      font-size: 13px;
      font-weight: bold;
    }

    h1, h2, h3 { text-align: center; }

    h1 {
      padding-right: 44px;
      padding-left: 44px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      background: #222;
      color: white;
      border: none;
      font-weight: bold;
    }

    button:disabled {
      background: #999;
      color: #eee;
      opacity: 0.7;
    }

    .shooter-row {
      background: #f1f4ff;
      padding: 12px;
      border-radius: 14px;
      margin: 10px 0;
    }

    .current-box {
      background: #eef6ff;
      padding: 14px;
      border-radius: 16px;
      margin-top: 12px;
      margin-bottom: 6px;
      text-align: center;
    }

    .target-note {
      font-size: 13px;
      color: #444;
      margin: 8px 0;
    }

    .machine-area {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 8px 0;
    }

    .machine-column {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-width: 0;
    }

    .direction-count {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 4px;
      color: #333;
      text-align: center;
    }

    .machine-column button {
      margin: 0;
      min-height: 52px;
      background: #6b87c7;
      font-size: 14px;
      padding: 10px 4px;
    }

    .machine-column button.selected {
      background: #062d91;
      outline: 4px solid rgba(6, 45, 145, 0.25);
      transform: scale(1.03);
    }

    .machine-column button.locked { background: #999; }

    .result-buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .result-buttons button {
      margin: 0;
      min-height: 52px;
      padding: 10px 4px;
    }

    .hit { background: #26834a; }
    .miss { background: #a83232; }
    .double { background: #7a42c8; }

    .control-buttons { margin-top: 10px; }

    .back-button { background: #b35b00; }

    .end-button {
      background: #111;
      margin-top: 28px;
    }

    .export-buttons {
      margin: 18px 0 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .export-image { background: #26834a; }
    .export-pdf { background: #7a42c8; }

    .reset-button {
      background: #3568d4;
      font-size: 18px;
      padding: 14px;
    }

    .message {
      min-height: 22px;
      color: #a83232;
      font-weight: bold;
      font-size: 14px;
      text-align: center;
      margin: 6px 0;
    }

    .score-symbol {
      font-size: 15px;
      font-weight: bold;
      line-height: 1;
      display: block;
    }

    .double-symbol { font-size: 18px; }

    .hit-symbol { color: #26834a; }
    .miss-symbol { color: #a83232; }
    .double-symbol { color: #7a42c8; }

    .scoresheet-wrap {
      width: 100%;
      overflow-x: auto;
      margin-top: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 7px;
      text-align: center;
    }

    th {
      background: #222;
      color: white;
    }

    .hidden { display: none; }

    .log-section {
      margin-top: 8px;
      padding: 10px;
      background: #fafafa;
      border-radius: 14px;
    }

    .round-info {
      text-align: center;
      font-size: 13px;
      color: #333;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .scoresheet-cell {
      text-align: center;
      min-width: 175px;
    }

    .shot-group {
      display: grid;
      grid-template-columns: repeat(5, 22px);
      justify-content: center;
      gap: 2px;
      margin: 3px auto;
      min-height: 25px;
    }

    .scorecell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 22px;
      min-height: 25px;
    }

    .machine-number {
      font-size: 13px;
      font-weight: normal;
      line-height: 1;
    }

    .empty-scorecell {
      width: 22px;
      min-height: 25px;
    }

    .station-subtitle {
      display: block;
      font-size: 12px;
      font-weight: normal;
      margin-top: 3px;
      color: #555;
    }

    .final-card {
      background: #f1f4ff;
      padding: 12px;
      border-radius: 14px;
      margin-top: 10px;
    }

    .final-symbol-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .final-symbol-item {
      font-weight: bold;
      text-align: center;
    }

    .analysis-box {
      background: white;
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
      text-align: left;
      font-size: 14px;
      line-height: 1.4;
    }

    .analysis-divider {
      border: none;
      border-top: 1px solid #ccc;
      margin: 12px 0;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin-top: 8px;
    }

    .analysis-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      font-weight: bold;
    }

    .analysis-row span:last-child {
      white-space: nowrap;
    }

    .rate-good {
      background: #e7f7ec;
      color: #176b35;
    }

    .rate-warning {
      background: #fff2d8;
      color: #9a5b00;
    }

    .rate-bad {
      background: #ffe3e3;
      color: #a83232;
    }

    .machine-station-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 6px;
      margin-bottom: 8px;
    }

    .machine-chip {
      padding: 7px 6px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
    }

    .analysis-title {
      margin-bottom: 4px;
      font-weight: bold;
    }

    .analysis-subtitle {
      font-size: 13px;
      color: #555;
      margin: 2px 0 6px;
    }

    .machine-analysis-title {
      margin-top: 12px;
    }

    @media (max-width: 480px) {
      body { padding: 6px; }

      .container {
        padding: 10px;
        border-radius: 12px;
      }

      h1 { font-size: 20px; }
      h2 { font-size: 18px; }

      input, select, button {
        font-size: 16px;
        padding: 11px;
      }

      .machine-area,
      .result-buttons,
      .export-buttons {
        gap: 6px;
      }

      .machine-column button,
      .result-buttons button {
        font-size: 13px;
        min-height: 48px;
      }

      th, td {
        padding: 6px;
        font-size: 13px;
      }

      .scoresheet-cell { min-width: 165px; }
    }
  </style>
</head>

<body>
<div class="container">
  <div class="settings-area" id="settingsArea">
    <button class="settings-button" onclick="toggleSettings(event)">⚙</button>
    <div id="settingsMenu" class="settings-menu hidden">
      <label id="languageLabel">Language</label>
      <select id="languageSelect" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="zh">简体中文</option>
      </select>
    </div>
  </div>

  <h1 data-i18n="appTitle">Olympic Trap Score Tracker</h1>

  <div id="setup">
    <h2 data-i18n="setupTitle">Set Up Shooters</h2>

    <label data-i18n="numShooters">Number of shooters:</label>
    <input type="number" id="shooterCount" min="1" max="6" value="3" onchange="createShooterInputs()">
    <button onclick="createShooterInputs()" data-i18n="createShooters">Create Shooters</button>

    <p class="message" id="stationWarning"></p>

    <div id="shooterInputs"></div>

    <button onclick="startRound()" data-i18n="startRound">Start Round</button>
  </div>

  <div id="scoreArea" class="hidden">
    <h2 data-i18n="roundTracker">Round Tracker</h2>

    <div class="current-box">
      <h3 id="currentShooterText"></h3>
      <p id="currentShotText"></p>

      <p class="target-note" data-i18n="targetNote">
        Each shooter can receive 2 right, 1 straight, and 2 left targets from each station.
      </p>

      <div id="machineButtons" class="machine-area"></div>

      <div class="result-buttons">
        <button class="hit" onclick="recordShot('Hit')">/ <span data-i18n="hit">Hit</span></button>
        <button class="miss" onclick="recordShot('Miss')">○ <span data-i18n="miss">Miss</span></button>
        <button class="double" onclick="recordShot('Double')">• <span data-i18n="double">Double</span></button>
      </div>

      <p class="message" id="actionMessage"></p>

      <div class="control-buttons">
        <button class="back-button" onclick="undoLastShot()" data-i18n="back">Back</button>
      </div>
    </div>

    <div id="allLogs"></div>

    <button class="end-button" onclick="endRound()" data-i18n="endRound">End Round</button>
  </div>

  <div id="finalPage" class="hidden">
    <h2 data-i18n="finalScoresheet">Final Scoresheet</h2>
    <div id="finalLogs"></div>

    <div class="export-buttons">
      <button class="export-image" onclick="exportScoresheetImage()" data-i18n="exportImage">Export Image</button>
      <button class="export-pdf" onclick="exportScoresheetPDF()" data-i18n="exportPDF">Export PDF</button>
    </div>

    <h2 data-i18n="resultsAnalysis">Results and Analysis</h2>
    <div id="finalResults"></div>

    <button class="reset-button" onclick="resetApp()" data-i18n="reset">Reset</button>
  </div>
</div>

<script>
let shooters = [];
let originalOrder = [];
let currentShooterIndex = 0;
let selectedMachine = null;
let selectedDirection = null;
let history = [];
let savedNames = [];
let savedStations = [];
let roundStartTime = null;
let roundEndTime = null;
let currentLanguage = "en";

const translations = {
  en: {
    appTitle: "Olympic Trap Score Tracker",
    setupTitle: "Set Up Shooters",
    numShooters: "Number of shooters:",
    createShooters: "Create Shooters",
    startRound: "Start Round",
    roundTracker: "Round Tracker",
    targetNote: "Each shooter can receive 2 right, 1 straight, and 2 left targets from each station.",
    hit: "Hit",
    miss: "Miss",
    double: "Double",
    back: "Back",
    endRound: "End Round",
    finalScoresheet: "Final Scoresheet",
    exportImage: "Export Image",
    exportPDF: "Export PDF",
    resultsAnalysis: "Results and Analysis",
    reset: "Reset",
    language: "Language",
    shooterName: "Shooter {n} name:",
    startingStation: "Starting station:",
    station: "Station",
    enterShooterName: "Enter shooter name",
    onlyShooter6: "Only shooter 6 can share a starting station.",
    namesBlank: "Shooter names cannot be blank.",
    selectMachineFirst: "Select a machine first.",
    noUndo: "No shot to undo.",
    onStation: "on Station",
    shotOf: "Shot {n} of 25",
    right: "Right",
    straight: "Straight",
    left: "Left",
    machine: "Machine",
    scoresheet: "Scoresheet",
    score: "Score",
    started: "Round Started",
    ended: "Round Ended",
    notRecorded: "Not recorded",
    finalScore: "Final Score",
    hits: "Hits",
    misses: "Misses",
    doubles: "Doubles",
    analysis: "Analysis",
    singleShotAnalysis: "Single Shot Analysis",
    directions: "Directions",
    machines: "Machines",
    noMachineData: "No machine data yet.",
    missed: "missed",
    savePhotoTip: "Long press the image, then choose Save to Photos."
  },
  zh: {
    appTitle: "奥运多向飞碟计分器",
    setupTitle: "设置运动员",
    numShooters: "运动员人数：",
    createShooters: "生成运动员",
    startRound: "开始本轮",
    roundTracker: "本轮记录",
    targetNote: "每位运动员在每个靶位最多可打 2 个右方、1 个正前方、2 个左方。",
    hit: "中",
    miss: "脱",
    double: "双发",
    back: "撤回",
    endRound: "结束本轮",
    finalScoresheet: "最终成绩表",
    exportImage: "导出图片",
    exportPDF: "导出 PDF",
    resultsAnalysis: "成绩与分析",
    reset: "重置",
    language: "语言",
    shooterName: "运动员 {n} 姓名：",
    startingStation: "起始靶位：",
    station: "靶位",
    enterShooterName: "输入运动员姓名",
    onlyShooter6: "只有第 6 位运动员可以和其他人共用起始靶位。",
    namesBlank: "运动员姓名不能为空。",
    selectMachineFirst: "请先选择抛靶机。",
    noUndo: "没有可撤回的记录。",
    onStation: "在靶位",
    shotOf: "第 {n} 靶，共 25 靶",
    right: "右方",
    straight: "正前方",
    left: "左方",
    machine: "抛靶机",
    scoresheet: "成绩表",
    score: "成绩",
    started: "开始时间",
    ended: "结束时间",
    notRecorded: "未记录",
    finalScore: "最终成绩",
    hits: "中靶",
    misses: "脱靶",
    doubles: "双发",
    analysis: "分析",
    singleShotAnalysis: "单发分析",
    directions: "方向",
    machines: "抛靶机",
    noMachineData: "暂无抛靶机数据。",
    missed: "脱靶",
    savePhotoTip: "长按图片，然后选择存入照片。"
  }
};

const stationMachines = {
  1: [
    { number: 1, direction: "Right" },
    { number: 2, direction: "Straight" },
    { number: 3, direction: "Left" }
  ],
  2: [
    { number: 4, direction: "Right" },
    { number: 5, direction: "Straight" },
    { number: 6, direction: "Left" }
  ],
  3: [
    { number: 7, direction: "Right" },
    { number: 8, direction: "Straight" },
    { number: 9, direction: "Left" }
  ],
  4: [
    { number: 10, direction: "Right" },
    { number: 11, direction: "Straight" },
    { number: 12, direction: "Left" }
  ],
  5: [
    { number: 13, direction: "Right" },
    { number: 14, direction: "Straight" },
    { number: 15, direction: "Left" }
  ]
};

const directionLimits = {
  Right: 2,
  Straight: 1,
  Left: 2
};

const directionOrder = ["Left", "Straight", "Right"];

function t(key, replacements = {}) {
  let text = translations[currentLanguage][key] || translations.en[key] || key;

  Object.keys(replacements).forEach(k => {
    text = text.replace(`{${k}}`, replacements[k]);
  });

  return text;
}

function directionText(direction) {
  if (direction === "Left") return t("left");
  if (direction === "Straight") return t("straight");
  return t("right");
}

function toggleSettings(event) {
  event.stopPropagation();
  document.getElementById("settingsMenu").classList.toggle("hidden");
}

document.addEventListener("click", function(event) {
  const settingsArea = document.getElementById("settingsArea");
  const settingsMenu = document.getElementById("settingsMenu");

  if (!settingsArea.contains(event.target)) {
    settingsMenu.classList.add("hidden");
  }
});

function changeLanguage(lang) {
  currentLanguage = lang;
  document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
  applyLanguage();
  createShooterInputs();

  if (!document.getElementById("scoreArea").classList.contains("hidden")) {
    updateDisplay();
  }

  if (!document.getElementById("finalPage").classList.contains("hidden")) {
    endRound(true);
  }
}

function applyLanguage() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });

  document.getElementById("languageLabel").textContent = t("language");
}

function formatDateTime(date) {
  if (!date) return t("notRecorded");

  return date.toLocaleString(currentLanguage === "zh" ? "zh-CN" : undefined, {
    year: "numeric",
    month: currentLanguage === "zh" ? "numeric" : "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit",
    hour12: true
  });
}

function saveCurrentSetup() {
  const count = Number(document.getElementById("shooterCount").value);

  for (let i = 0; i < count; i++) {
    const nameInput = document.getElementById("name" + i);
    const stationInput = document.getElementById("station" + i);

    if (nameInput) savedNames[i] = nameInput.value;
    if (stationInput) savedStations[i] = Number(stationInput.value);
  }
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function setMessage(text) {
  document.getElementById("actionMessage").textContent = text || "";
}

function createShooterInputs() {
  saveCurrentSetup();

  let count = Number(document.getElementById("shooterCount").value);

  if (count < 1) count = 1;
  if (count > 6) count = 6;

  document.getElementById("shooterCount").value = count;

  const div = document.getElementById("shooterInputs");
  div.innerHTML = "";

  for (let i = 0; i < count; i++) {
    let defaultStation = savedStations[i];

    if (!defaultStation) {
      defaultStation = i + 1;
      if (i === 5) defaultStation = 1;
    }

    let options = "";

    for (let s = 1; s <= 5; s++) {
      const selected = s === defaultStation ? "selected" : "";
      options += `<option value="${s}" ${selected}>${t("station")} ${s}</option>`;
    }

    const savedName = savedNames[i] !== undefined ? savedNames[i] : "Shooter ";

    div.insertAdjacentHTML("beforeend", `
      <div class="shooter-row">
        <label>${t("shooterName", { n: i + 1 })}</label>
        <input type="text" id="name${i}" value="${escapeHtml(savedName)}" placeholder="${t("enterShooterName")}" oninput="saveCurrentSetup()">

        <label>${t("startingStation")}</label>
        <select id="station${i}" onchange="saveCurrentSetup(); checkStations();">
          ${options}
        </select>
      </div>
    `);
  }

  checkStations();
}

function makeCounts() {
  return {
    1: { Right: 0, Straight: 0, Left: 0 },
    2: { Right: 0, Straight: 0, Left: 0 },
    3: { Right: 0, Straight: 0, Left: 0 },
    4: { Right: 0, Straight: 0, Left: 0 },
    5: { Right: 0, Straight: 0, Left: 0 }
  };
}

function checkStations() {
  const count = Number(document.getElementById("shooterCount").value);
  const stationOwner = {};
  let invalid = false;

  for (let i = 0; i < count; i++) {
    const station = document.getElementById("station" + i).value;

    if (stationOwner[station] !== undefined) {
      const first = stationOwner[station];
      const second = i;
      const allowed = count === 6 && (first === 5 || second === 5);

      if (!allowed) invalid = true;
    } else {
      stationOwner[station] = i;
    }
  }

  document.getElementById("stationWarning").textContent =
    invalid ? t("onlyShooter6") : "";
}

function startRound() {
  saveCurrentSetup();

  const count = Number(document.getElementById("shooterCount").value);
  const stationOwner = {};

  shooters = [];
  history = [];
  currentShooterIndex = 0;
  roundStartTime = new Date();
  roundEndTime = null;

  for (let i = 0; i < count; i++) {
    const name = document.getElementById("name" + i).value.trim();

    if (name === "") {
      document.getElementById("stationWarning").textContent = t("namesBlank");
      return;
    }

    const station = Number(document.getElementById("station" + i).value);

    if (stationOwner[station] !== undefined) {
      const first = stationOwner[station];
      const second = i;
      const allowed = count === 6 && (first === 5 || second === 5);

      if (!allowed) {
        document.getElementById("stationWarning").textContent = t("onlyShooter6");
        return;
      }
    } else {
      stationOwner[station] = i;
    }

    shooters.push({
      name: name,
      startStation: station,
      station: station,
      shooterNumber: i + 1,
      shots: 0,
      hits: 0,
      misses: 0,
      doubles: 0,
      targetCounts: makeCounts(),
      log: []
    });
  }

  shooters.sort((a, b) => {
    const aKey = a.shooterNumber === 6 ? 6 : a.startStation;
    const bKey = b.shooterNumber === 6 ? 6 : b.startStation;
    return aKey - bKey;
  });

  originalOrder = shooters;

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("scoreArea").classList.remove("hidden");
  document.getElementById("finalPage").classList.add("hidden");

  updateDisplay();
}

function updateDisplay() {
  selectedMachine = null;
  selectedDirection = null;
  setMessage("");

  if (shooters.every(s => s.shots >= 25)) {
    endRound();
    return;
  }

  while (shooters[currentShooterIndex].shots >= 25) {
    currentShooterIndex++;
    if (currentShooterIndex >= shooters.length) currentShooterIndex = 0;
  }

  const shooter = shooters[currentShooterIndex];

  document.getElementById("currentShooterText").textContent =
    `${shooter.name} ${t("onStation")} ${shooter.station}`;

  document.getElementById("currentShotText").textContent =
    t("shotOf", { n: shooter.shots + 1 });

  createMachineButtons(shooter);
  updateLogs();
}

function createMachineButtons(shooter) {
  const div = document.getElementById("machineButtons");
  div.innerHTML = "";

  const station = shooter.station;
  const counts = shooter.targetCounts[station];

  stationMachines[station].forEach(m => {
    const column = document.createElement("div");
    column.className = "machine-column";

    const label = document.createElement("div");
    label.className = "direction-count";
    label.textContent =
      directionText(m.direction) + " " + counts[m.direction] + "/" + directionLimits[m.direction];

    const button = document.createElement("button");
    button.textContent = `${t("machine")} ${m.number}`;

    const locked = counts[m.direction] >= directionLimits[m.direction];

    if (locked) {
      button.disabled = true;
      button.classList.add("locked");
    }

    button.onclick = function() {
      selectedMachine = m.number;
      selectedDirection = m.direction;
      setMessage("");

      document.querySelectorAll(".machine-column button").forEach(b => {
        b.classList.remove("selected");
      });

      button.classList.add("selected");
    };

    column.appendChild(label);
    column.appendChild(button);
    div.appendChild(column);
  });
}

function recordShot(result) {
  const shooter = shooters[currentShooterIndex];

  if (selectedMachine === null) {
    setMessage(t("selectMachineFirst"));
    return;
  }

  history.push({
    shooters: JSON.stringify(shooters),
    currentShooterIndex: currentShooterIndex
  });

  shooter.shots++;

  if (result === "Hit") shooter.hits++;
  if (result === "Miss") shooter.misses++;
  if (result === "Double") shooter.doubles++;

  shooter.targetCounts[shooter.station][selectedDirection]++;

  shooter.log.push({
    machine: selectedMachine,
    direction: selectedDirection,
    result: result
  });

  shooter.station++;
  if (shooter.station > 5) shooter.station = 1;

  currentShooterIndex++;
  if (currentShooterIndex >= shooters.length) currentShooterIndex = 0;

  updateDisplay();
}

function undoLastShot() {
  if (history.length === 0) {
    setMessage(t("noUndo"));
    return;
  }

  const last = history.pop();

  shooters = JSON.parse(last.shooters);
  originalOrder = shooters;
  currentShooterIndex = last.currentShooterIndex;

  updateDisplay();
}

function getSymbol(result) {
  if (result === "Hit") return `<span class="score-symbol hit-symbol">/</span>`;
  if (result === "Miss") return `<span class="score-symbol miss-symbol">○</span>`;
  return `<span class="score-symbol double-symbol">•</span>`;
}

function makeShotCell(entry) {
  if (!entry) return `<span class="empty-scorecell"></span>`;

  return `
    <span class="scorecell">
      ${getSymbol(entry.result)}
      <span class="machine-number">${entry.machine}</span>
    </span>
  `;
}

function makeScoresheet(title, includeRoundInfo) {
  let rows = "";

  originalOrder.forEach(s => {
    let html = "";
    const groupsToShow = Math.ceil(s.log.length / 5);

    for (let group = 0; group < groupsToShow; group++) {
      html += `<div class="shot-group">`;

      for (let slot = 0; slot < 5; slot++) {
        const index = group * 5 + slot;
        html += makeShotCell(index < s.log.length ? s.log[index] : null);
      }

      html += `</div>`;
    }

    rows += `
      <tr>
        <td>
          <strong>${s.name}</strong>
          <span class="station-subtitle">(${t("station")} ${s.startStation})</span>
        </td>
        <td class="scoresheet-cell">${html || t("noMachineData")}</td>
        <td><strong>${s.hits + s.doubles}</strong></td>
      </tr>
    `;
  });

  const roundInfo = includeRoundInfo ? `
    <div class="round-info">
      <div><strong>${t("started")}:</strong> ${formatDateTime(roundStartTime)}</div>
      <div><strong>${t("ended")}:</strong> ${formatDateTime(roundEndTime)}</div>
    </div>
  ` : "";

  return `
    <div class="log-section">
      ${title ? `<h2>${title}</h2>` : ""}
      ${roundInfo}
      <div class="scoresheet-wrap">
        <table>
          <thead>
            <tr>
              <th>${currentLanguage === "zh" ? "运动员" : "Shooter"}</th>
              <th>${t("scoresheet")}</th>
              <th>${t("score")}</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function updateLogs() {
  document.getElementById("allLogs").innerHTML = makeScoresheet(t("scoresheet"), false);
}

function makeFinalSymbolSummary(s) {
  return `
    <div class="final-symbol-row">
      <div class="final-symbol-item">
        <span class="score-symbol hit-symbol">/</span>
        ${t("hits")}: ${s.hits}
      </div>
      <div class="final-symbol-item">
        <span class="score-symbol miss-symbol">○</span>
        ${t("misses")}: ${s.misses}
      </div>
      <div class="final-symbol-item">
        <span class="score-symbol double-symbol">•</span>
        ${t("doubles")}: ${s.doubles}
      </div>
    </div>
  `;
}

function getRateClass(rate) {
  if (rate < 0.2) return "rate-good";
  if (rate < 0.5) return "rate-warning";
  return "rate-bad";
}

function buildAnalysisData(log, missRule) {
  const directionData = {
    Left: { misses: 0, total: 0 },
    Straight: { misses: 0, total: 0 },
    Right: { misses: 0, total: 0 }
  };

  const machineData = {};

  for (let i = 1; i <= 15; i++) {
    machineData[i] = { misses: 0, total: 0 };
  }

  log.forEach(entry => {
    directionData[entry.direction].total++;
    machineData[entry.machine].total++;

    if (missRule(entry)) {
      directionData[entry.direction].misses++;
      machineData[entry.machine].misses++;
    }
  });

  return { directionData, machineData };
}

function makeDirectionRows(directionData) {
  return directionOrder.map(direction => {
    const data = directionData[direction];
    const rate = data.total === 0 ? 0 : data.misses / data.total;
    const percent = Math.round(rate * 100);

    return `
      <div class="analysis-row ${getRateClass(rate)}">
        <span>${directionText(direction)}</span>
        <span>${data.misses}/${data.total} ${t("missed")}, ${percent}%</span>
      </div>
    `;
  }).join("");
}

function makeMachineChip(machine, data) {
  const rate = data.total === 0 ? 0 : data.misses / data.total;
  const percent = Math.round(rate * 100);

  return `
    <span class="machine-chip ${getRateClass(rate)}">
      ${machine}: ${data.misses}/${data.total}, ${percent}%
    </span>
  `;
}

function makeMachineRows(machineData) {
  let html = "";

  for (let station = 1; station <= 5; station++) {
    const machines = stationMachines[station].map(m => m.number);

    html += `<div class="machine-station-row">`;

    machines.forEach(machine => {
      html += makeMachineChip(machine, machineData[machine]);
    });

    html += `</div>`;
  }

  return html;
}

function makeAnalysisSection(title, data) {
  return `
    <p class="analysis-title">${title}</p>
    <div class="analysis-subtitle">${t("directions")}</div>
    <div class="analysis-grid">
      ${makeDirectionRows(data.directionData)}
    </div>
    <div class="analysis-subtitle machine-analysis-title">${t("machines")}</div>
    ${makeMachineRows(data.machineData)}
  `;
}

function makeShooterAnalysis(s) {
  const regular = buildAnalysisData(
    s.log,
    entry => entry.result === "Miss"
  );

  const singleShot = buildAnalysisData(
    s.log,
    entry => entry.result === "Miss" || entry.result === "Double"
  );

  return `
    <div class="analysis-box">
      ${makeAnalysisSection(t("analysis"), regular)}

      <hr class="analysis-divider">

      ${makeAnalysisSection(t("singleShotAnalysis"), singleShot)}
    </div>
  `;
}

function endRound(keepExistingEndTime = false) {
  if (!roundEndTime || !keepExistingEndTime) {
    roundEndTime = new Date();
  }

  document.getElementById("scoreArea").classList.add("hidden");
  document.getElementById("finalPage").classList.remove("hidden");

  document.getElementById("finalLogs").innerHTML = makeScoresheet("", true);

  let html = "";

  originalOrder.forEach(s => {
    html += `
      <div class="final-card">
        <h3>${s.name}</h3>
        <p><strong>${t("startingStation")} </strong>${s.startStation}</p>
        <p><strong>${t("finalScore")}:</strong> ${s.hits + s.doubles}</p>
        ${makeFinalSymbolSummary(s)}
        ${makeShooterAnalysis(s)}
      </div>
    `;
  });

  document.getElementById("finalResults").innerHTML = html;
}

async function exportScoresheetImage() {
  const element = document.getElementById("finalLogs");

  const canvas = await html2canvas(element, {
    backgroundColor: "#ffffff",
    scale: 3
  });

  const dataUrl = canvas.toDataURL("image/png");
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

  if (isIOS) {
    const newWindow = window.open();
    newWindow.document.write(`
      <html>
        <body style="margin:0; background:white;">
          <img src="${dataUrl}" style="width:100%; height:auto;">
          <p style="font-family:Arial; padding:12px;">
            ${t("savePhotoTip")}
          </p>
        </body>
      </html>
    `);
    newWindow.document.close();
  } else {
    const link = document.createElement("a");
    link.download = "olympic-trap-scoresheet.png";
    link.href = dataUrl;
    link.click();
  }
}

async function exportScoresheetPDF() {
  const element = document.getElementById("finalLogs");

  const canvas = await html2canvas(element, {
    backgroundColor: "#ffffff",
    scale: 3
  });

  const imgData = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({
    orientation: "portrait",
    unit: "mm",
    format: "a4"
  });

  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  const imgWidth = pageWidth - 20;
  const imgHeight = canvas.height * imgWidth / canvas.width;

  if (imgHeight <= pageHeight - 20) {
    pdf.addImage(imgData, "PNG", 10, 10, imgWidth, imgHeight);
  } else {
    let heightLeft = imgHeight;
    let position = 10;

    pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
    heightLeft -= pageHeight - 20;

    while (heightLeft > 0) {
      position -= pageHeight - 20;
      pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
      heightLeft -= pageHeight - 20;
    }
  }

  const blobUrl = pdf.output("bloburl");
  window.open(blobUrl, "_blank");
}

function resetApp() {
  saveCurrentSetup();

  shooters = [];
  originalOrder = [];
  currentShooterIndex = 0;
  selectedMachine = null;
  selectedDirection = null;
  history = [];
  roundStartTime = null;
  roundEndTime = null;

  document.getElementById("finalPage").classList.add("hidden");
  document.getElementById("scoreArea").classList.add("hidden");
  document.getElementById("setup").classList.remove("hidden");

  createShooterInputs();
}

applyLanguage();
createShooterInputs();
</script>
