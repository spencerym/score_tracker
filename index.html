<!DOCTYPE html>
<html lang="en">
<head>
  <title>Olympic Trap Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      touch-action: manipulation;
    }

    body {
      font-family: Arial, sans-serif;
      background: #eef3ff;
      margin: 0;
      padding: 10px;
    }

    .hidden { display: none !important; }

    .container {
      width: 100%;
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 14px;
      border-radius: 16px;
      position: relative;
    }

    .settings-area {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
    }

    .settings-button {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 50%;
      font-size: 20px;
      background: #222;
    }

    .settings-menu {
      position: absolute;
      right: 0;
      top: 46px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 10px;
      width: 170px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }

    h1, h2, h3 { text-align: center; }

    h1 {
      padding-right: 44px;
      padding-left: 44px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      background: #222;
      color: white;
      border: none;
      font-weight: bold;
      outline: none;
      user-select: none;
    }

    button:focus,
    button:active {
      outline: none;
      box-shadow: none;
    }

    button:disabled {
      background: #999;
      color: #eee;
      opacity: 0.7;
    }

    .shooter-row {
      background: #f1f4ff;
      padding: 12px;
      border-radius: 14px;
      margin: 10px 0;
    }

    .current-box {
      background: #eef6ff;
      padding: 14px;
      border-radius: 16px;
      margin-top: 12px;
      margin-bottom: 6px;
      text-align: center;
    }

    .target-note {
      font-size: 13px;
      color: #444;
      margin: 8px 0;
    }

    .machine-area {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 8px 0;
    }

    .machine-column {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-width: 0;
    }

    .direction-count {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 4px;
      color: #333;
      text-align: center;
    }

    .machine-column button {
      margin: 0;
      min-height: 52px;
      background: #6b87c7;
      font-size: 14px;
      padding: 10px 4px;
    }

    .machine-column button.selected {
      background: #062d91;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.75);
    }

    .machine-column button.locked {
      background: #999;
    }

    .result-buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .result-buttons button {
      margin: 0;
      min-height: 52px;
      padding: 10px 4px;
    }

    .hit { background: #26834a; }
    .miss { background: #a83232; }
    .double { background: #7a42c8; }

    .back-button { background: #b35b00; }

    .end-button {
      background: #111;
      margin-top: 28px;
    }

    .export-buttons {
      margin: 18px 0 28px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .export-image { background: #26834a; }

    .reset-button {
      background: #3568d4;
      font-size: 18px;
      padding: 14px;
    }

    .message {
      min-height: 22px;
      color: #a83232;
      font-weight: bold;
      font-size: 14px;
      text-align: center;
      margin: 6px 0;
    }

    .score-symbol {
      font-size: 15px;
      font-weight: bold;
      line-height: 1;
      display: block;
    }

    .double-symbol { font-size: 18px; }

    .hit-symbol { color: #26834a; }
    .miss-symbol { color: #a83232; }
    .double-symbol { color: #7a42c8; }

    .scoresheet-wrap {
      width: 100%;
      overflow-x: auto;
      margin-top: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 7px;
      text-align: center;
    }

    th {
      background: #222;
      color: white;
    }

    .log-section {
      margin-top: 8px;
      padding: 10px;
      background: #fafafa;
      border-radius: 14px;
    }

    .round-info {
      text-align: center;
      font-size: 13px;
      color: #333;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .scoresheet-cell {
      text-align: center;
      min-width: 175px;
    }

    .shot-group {
      display: grid;
      grid-template-columns: repeat(5, 22px);
      justify-content: center;
      gap: 2px;
      margin: 3px auto;
      min-height: 25px;
    }

    .scorecell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 22px;
      min-height: 25px;
      border-radius: 6px;
    }

    .editable-shot {
      cursor: pointer;
      background: #f8fafc;
    }

    .highlight-shot {
      background: #fff2b8 !important;
      outline: 2px solid #f59e0b;
      border-radius: 6px;
    }

    .na-cell {
      font-size: 10px;
      color: #777;
      font-weight: bold;
      background: #e5e7eb;
      border-radius: 6px;
    }

    .machine-number {
      font-size: 13px;
      font-weight: normal;
      line-height: 1;
    }

    .empty-scorecell {
      width: 22px;
      min-height: 25px;
    }

    .station-subtitle {
      display: block;
      font-size: 12px;
      font-weight: normal;
      margin-top: 3px;
      color: #555;
    }

    .away-label {
      display: block;
      font-size: 11px;
      color: #a83232;
      margin-top: 3px;
    }

    .live-board-area {
      margin-top: 8px;
      padding: 10px;
      background: #fafafa;
      border-radius: 14px;
      overflow-x: auto;
    }

    .live-board-inner {
      min-width: 420px;
    }

    .live-header {
      display: grid;
      grid-template-columns: 1fr 78px;
      gap: 8px;
      align-items: stretch;
    }

    .live-header-spacer {
      height: 34px;
    }

    .live-row-wrap {
      display: grid;
      grid-template-columns: 1fr 78px;
      gap: 8px;
      align-items: center;
    }

    .live-row-table table {
      table-layout: fixed;
    }

    .live-row-table td:first-child,
    .live-row-table th:first-child {
      width: 88px;
    }

    .live-row-table td:last-child,
    .live-row-table th:last-child {
      width: 50px;
    }

    .live-action-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 42px;
    }

    .live-action-button {
      padding: 7px 4px;
      margin: 0;
      font-size: 12px;
      min-height: 35px;
    }

    .leave-button { background: #c2410c; }
    .join-button { background: #2563eb; }

    .final-card {
      background: #f1f4ff;
      padding: 12px;
      border-radius: 14px;
      margin-top: 10px;
    }

    .final-symbol-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .final-symbol-item {
      font-weight: bold;
      text-align: center;
    }

    .analysis-box {
      background: white;
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
      text-align: left;
      font-size: 14px;
      line-height: 1.4;
    }

    .analysis-divider {
      border: none;
      border-top: 1px solid #ccc;
      margin: 12px 0;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin-top: 8px;
    }

    .analysis-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      font-weight: bold;
    }

    .analysis-row span:last-child {
      white-space: nowrap;
    }

    .rate-good {
      background: #e7f7ec;
      color: #176b35;
    }

    .rate-warning {
      background: #fff2d8;
      color: #9a5b00;
    }

    .rate-bad {
      background: #ffe3e3;
      color: #a83232;
    }

    .machine-station-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 6px;
      margin-bottom: 8px;
    }

    .machine-chip {
      padding: 7px 6px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
    }

    .analysis-title {
      margin-bottom: 4px;
      font-weight: bold;
    }

    .analysis-subtitle {
      font-size: 13px;
      color: #555;
      margin: 2px 0 6px;
    }

    .machine-analysis-title {
      margin-top: 12px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-box {
      width: 100%;
      max-width: 390px;
      background: white;
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 8px 28px rgba(0,0,0,0.25);
    }

    .modal-box h3 {
      margin-top: 4px;
    }

    .modal-box p {
      font-size: 14px;
      color: #444;
      line-height: 1.4;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .modal-actions-edit {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .modal-actions-edit button {
      font-size: 13px;
      padding: 10px 4px;
    }

    .modal-cancel-full {
      margin-top: 8px;
    }

    .confirm-button { background: #c2410c; }
    .cancel-button { background: #475569; }

    .edit-preview {
      margin: 10px 0;
      padding: 8px;
      background: #f8fafc;
      border-radius: 12px;
      overflow-x: auto;
    }

    @media (max-width: 480px) {
      body { padding: 6px; }

      .container {
        padding: 10px;
        border-radius: 12px;
      }

      h1 { font-size: 20px; }
      h2 { font-size: 18px; }

      input, select, button {
        font-size: 16px;
        padding: 11px;
      }

      .machine-area,
      .result-buttons,
      .export-buttons {
        gap: 6px;
      }

      .machine-column button,
      .result-buttons button {
        font-size: 13px;
        min-height: 48px;
      }

      th, td {
        padding: 6px;
        font-size: 13px;
      }

      .scoresheet-cell { min-width: 165px; }

      .live-board-inner {
        min-width: 400px;
      }

      .live-row-wrap,
      .live-header {
        grid-template-columns: 1fr 70px;
      }
    }
  </style>
</head>

<body>
<div class="container">
  <div class="settings-area" id="settingsArea">
    <button class="settings-button" onclick="toggleSettings(event)">⚙</button>
    <div id="settingsMenu" class="settings-menu hidden">
      <label id="languageLabel">Language</label>
      <select id="languageSelect" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="zh">简体中文</option>
      </select>
    </div>
  </div>

  <h1 data-i18n="appTitle">Olympic Trap Score Tracker</h1>

  <div id="setup">
    <h2 data-i18n="setupTitle">Set Up Shooters</h2>

    <label data-i18n="numShooters">Number of shooters:</label>
    <input
      type="number"
      inputmode="numeric"
      pattern="[0-9]*"
      id="shooterCount"
      min="1"
      max="6"
      value="3"
      onfocus="clearShooterCountField()"
      oninput="createShooterInputs()"
    >

    <p class="message" id="stationWarning"></p>

    <div id="shooterInputs"></div>

    <button onclick="startRound()" data-i18n="startRound">Start Round</button>
  </div>

  <div id="scoreArea" class="hidden">
    <h2 data-i18n="roundTracker">Round Tracker</h2>

    <div class="current-box">
      <h3 id="currentShooterText"></h3>
      <p id="currentShotText"></p>

      <p class="target-note" data-i18n="targetNote">
        Each shooter can receive 2 right, 1 straight, and 2 left targets from each station.
      </p>

      <div id="machineButtons" class="machine-area"></div>

      <div class="result-buttons">
        <button class="hit" onclick="recordShot('Hit')">/ <span data-i18n="hit">Hit</span></button>
        <button class="miss" onclick="recordShot('Miss')">○ <span data-i18n="miss">Miss</span></button>
        <button class="double" onclick="recordShot('Double')">• <span data-i18n="double">Double</span></button>
      </div>

      <p class="message" id="actionMessage"></p>

      <button class="back-button" onclick="undoLastShot()" data-i18n="back">Back</button>
    </div>

    <div id="allLogs"></div>

    <button class="end-button" onclick="requestEndRound()" data-i18n="endRound">End Round</button>
  </div>

  <div id="finalPage" class="hidden">
    <h2 data-i18n="finalScoresheet">Final Scoresheet</h2>
    <div id="finalLogs"></div>

    <div class="export-buttons">
      <button class="export-image" onclick="exportScoresheetImage()" data-i18n="exportImage">Export Image</button>
    </div>

    <h2 data-i18n="resultsAnalysis">Results and Analysis</h2>
    <div id="finalResults"></div>

    <button class="reset-button" onclick="requestResetRound()" data-i18n="reset">Reset</button>
  </div>
</div>

<div id="modalBackdrop" class="modal-backdrop hidden">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <p id="modalMessage"></p>
    <div id="editPreview" class="edit-preview hidden"></div>
    <div id="modalButtons"></div>
  </div>
</div>

let shooters = [];
let originalOrder = [];
let currentShooterIndex = 0;
let selectedMachine = null;
let selectedDirection = null;
let history = [];
let savedNames = [];
let savedStations = [];
let roundStartTime = null;
let roundEndTime = null;
let currentLanguage = "en";
let editingShooterIndex = null;
let editingShotIndex = null;

const translations = {

const stationMachines = {
  1: [
    { number: 1, direction: "Right" },
    { number: 2, direction: "Straight" },
    { number: 3, direction: "Left" }
  ],
  2: [
    { number: 4, direction: "Right" },
    { number: 5, direction: "Straight" },
    { number: 6, direction: "Left" }
  ],
  3: [
    { number: 7, direction: "Right" },
    { number: 8, direction: "Straight" },

  ],
  4: [
    { number: 10, direction: "Right" },
    { number: 11, direction: "Straight" },
    { number: 12, direction: "Left" }
  ],
  5: [
    { number: 13, direction: "Right" },
    { number: 14, direction: "Straight" },
    { number: 15, direction: "Left" }
  ]
};

const directionLimits = {
  Right: 2,
  Straight: 1,
  Left: 2
};

const directionOrder = ["Left", "Straight", "Right"];

function defaultNamePrefix() {
  return currentLanguage === "zh" ? "运动员 " : "Shooter ";
}

function convertNameForLanguageSwitch(name, targetLanguage) {
  if (targetLanguage === "zh" && name.startsWith("Shooter ")) {
    return "运动员 " + name.slice("Shooter ".length);
  }

  if (targetLanguage === "en" && name.startsWith("运动员 ")) {
    return "Shooter " + name.slice("运动员 ".length);
  }

  return name;
}

function t(key, replacements = {}) {
  let text = translations[currentLanguage][key] || translations.en[key] || key;

  Object.keys(replacements).forEach(k => {
    text = text.replace(`{${k}}`, replacements[k]);
  });

  return text;
}

function directionText(direction) {
  if (direction === "Left") return t("left");
  if (direction === "Straight") return t("straight");
  return t("right");
}

function clearShooterCountField() {
  const input = document.getElementById("shooterCount");

  if (!shooterCountClearedThisFocus) {
    input.value = "";
    shooterCountClearedThisFocus = true;
  }

  input.onblur = function() {
    shooterCountClearedThisFocus = false;

    if (input.value === "") {
      input.value = "1";
      createShooterInputs();
    }
  };
}

function toggleSettings(event) {
  event.stopPropagation();
  document.getElementById("settingsMenu").classList.toggle("hidden");
}

document.addEventListener("click", function(event) {
  const settingsArea = document.getElementById("settingsArea");
  const settingsMenu = document.getElementById("settingsMenu");

  if (!settingsArea.contains(event.target)) {
    settingsMenu.classList.add("hidden");
  }
});

function changeLanguage(lang) {
  const setupVisible = !document.getElementById("setup").classList.contains("hidden");

  if (setupVisible) {
    saveCurrentSetup();

    savedNames = savedNames.map(name => {
      return convertNameForLanguageSwitch(name, lang);
    });
  }

  currentLanguage = lang;
  document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";

  applyLanguage();
  createShooterInputs(false);

  if (!document.getElementById("scoreArea").classList.contains("hidden")) {
    updateDisplay();
  }

  if (!document.getElementById("finalPage").classList.contains("hidden")) {
    endRound(true);
  }
}

function applyLanguage() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });

  document.getElementById("languageLabel").textContent = t("language");
}

function formatDateTime(date) {
  if (!date) return t("notRecorded");

  return date.toLocaleString(currentLanguage === "zh" ? "zh-CN" : undefined, {
    year: "numeric",
    month: currentLanguage === "zh" ? "numeric" : "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit",
    hour12: true
  });
}

function saveCurrentSetup() {
  const count = Number(document.getElementById("shooterCount").value);

  if (!count || count < 1) return;

  for (let i = 0; i < count; i++) {
    const nameInput = document.getElementById("name" + i);
    const stationInput = document.getElementById("station" + i);

    if (nameInput) savedNames[i] = nameInput.value;
    if (stationInput) savedStations[i] = Number(stationInput.value);
  }
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function setMessage(text) {
  document.getElementById("actionMessage").textContent = text || "";
}

function createShooterInputs(shouldSave = true) {
  if (shouldSave) {
    saveCurrentSetup();
  }

  let count = Number(document.getElementById("shooterCount").value);

  if (!count) return;

  if (count < 1) count = 1;
  if (count > 6) count = 6;

  document.getElementById("shooterCount").value = count;

  const div = document.getElementById("shooterInputs");
  div.innerHTML = "";

  for (let i = 0; i < count; i++) {
    let defaultStation = savedStations[i];

    if (!defaultStation) {
      defaultStation = i + 1;
      if (i === 5) defaultStation = 1;
    }

    let options = "";

    for (let s = 1; s <= 5; s++) {
      const selected = s === defaultStation ? "selected" : "";
      options += `<option value="${s}" ${selected}>${t("station")} ${s}</option>`;
    }

    const savedName = savedNames[i] !== undefined ? savedNames[i] : defaultNamePrefix();

    div.insertAdjacentHTML("beforeend", `
      <div class="shooter-row">
        <label>${t("shooterName", { n: i + 1 })}</label>
        <input type="text" id="name${i}" value="${escapeHtml(savedName)}" placeholder="${t("enterShooterName")}" oninput="saveCurrentSetup()">

        <label>${t("startingStation")}</label>
        <select id="station${i}" onchange="saveCurrentSetup(); checkStations();">
          ${options}
        </select>
      </div>
    `);
  }

  checkStations();
}

function makeCounts() {
  return {
    1: { Right: 0, Straight: 0, Left: 0 },
    2: { Right: 0, Straight: 0, Left: 0 },
    3: { Right: 0, Straight: 0, Left: 0 },
    4: { Right: 0, Straight: 0, Left: 0 },
    5: { Right: 0, Straight: 0, Left: 0 }
  };
}

function checkStations() {
  const count = Number(document.getElementById("shooterCount").value);
  const stationOwner = {};
  let invalid = false;

  if (!count) return;

  for (let i = 0; i < count; i++) {
    const stationElement = document.getElementById("station" + i);
    if (!stationElement) continue;

    const station = stationElement.value;

    if (stationOwner[station] !== undefined) {
      const first = stationOwner[station];
      const second = i;
      const allowed = count === 6 && (first === 5 || second === 5);

      if (!allowed) invalid = true;
    } else {
      stationOwner[station] = i;
    }
  }

  document.getElementById("stationWarning").textContent =
    invalid ? t("onlyShooter6") : "";
}

function startRound() {
  saveCurrentSetup();

  const count = Number(document.getElementById("shooterCount").value);
  const stationOwner = {};

  shooters = [];
  history = [];
  currentShooterIndex = 0;
  roundStartTime = new Date();
  roundEndTime = null;

  for (let i = 0; i < count; i++) {
    const name = document.getElementById("name" + i).value.trim();

    if (name === "") {
      document.getElementById("stationWarning").textContent = t("namesBlank");
      return;
    }

    const station = Number(document.getElementById("station" + i).value);

    if (stationOwner[station] !== undefined) {
      const first = stationOwner[station];
      const second = i;
      const allowed = count === 6 && (first === 5 || second === 5);

      if (!allowed) {
        document.getElementById("stationWarning").textContent = t("onlyShooter6");
        return;
      }
    } else {
      stationOwner[station] = i;
    }

    shooters.push({
      name: name,
      startStation: station,
      station: station,
      shooterNumber: i + 1,
      shots: 0,
      hits: 0,
      misses: 0,
      doubles: 0,
      away: false,
      targetCounts: makeCounts(),
      log: []
    });
  }

  shooters.sort((a, b) => {
    const aKey = a.shooterNumber === 6 ? 6 : a.startStation;
    const bKey = b.shooterNumber === 6 ? 6 : b.startStation;
    return aKey - bKey;
  });

  originalOrder = shooters;

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("scoreArea").classList.remove("hidden");
  document.getElementById("finalPage").classList.add("hidden");

  updateDisplay();
}

function roundFullyComplete() {
  return shooters.length > 0 && shooters.every(s => s.shots >= 25);
}

function availableShootersExist() {
  return shooters.some(s => !s.away && s.shots < 25);
}

function addSkippedShot(shooter) {
  shooter.shots++;
  shooter.log.push({
    result: "NA",
    machine: null,
    direction: null,
    skipped: true
  });

  shooter.station++;
  if (shooter.station > 5) shooter.station = 1;
}

function moveToNextAvailableShooter() {
  if (roundFullyComplete()) {
    endRound();
    return;
  }

  if (!availableShootersExist()) {
    requestEndRound();
    return;
  }

  let guard = 0;

  while (guard < shooters.length * 3) {
    const shooter = shooters[currentShooterIndex];

    if (shooter.shots >= 25) {
      currentShooterIndex++;
      if (currentShooterIndex >= shooters.length) currentShooterIndex = 0;
      guard++;
      continue;
    }

    if (shooter.away) {
      addSkippedShot(shooter);
      currentShooterIndex++;
      if (currentShooterIndex >= shooters.length) currentShooterIndex = 0;
      guard++;
      continue;
    }

    break;
  }
}

function updateDisplay() {
  selectedMachine = null;
  selectedDirection = null;
  setMessage("");

  if (roundFullyComplete()) {
    endRound();
    return;
  }

  if (!availableShootersExist()) {
    requestEndRound();
    updateLogs();
    return;
  }

  moveToNextAvailableShooter();

  if (document.getElementById("scoreArea").classList.contains("hidden")) {
    return;
  }

  const shooter = shooters[currentShooterIndex];

  document.getElementById("currentShooterText").textContent =
    `${shooter.name} ${t("onStation")} ${shooter.station}`;

  document.getElementById("currentShotText").textContent =
    t("shotOf", { n: shooter.shots + 1 });

  createMachineButtons(shooter);
  updateLogs();
}

function createMachineButtons(shooter) {
  const div = document.getElementById("machineButtons");
  div.innerHTML = "";

  const station = shooter.station;
  const counts = shooter.targetCounts[station];

  stationMachines[station].forEach(m => {
    const column = document.createElement("div");
    column.className = "machine-column";

    const label = document.createElement("div");
    label.className = "direction-count";
    label.textContent =
      directionText(m.direction) + " " + counts[m.direction] + "/" + directionLimits[m.direction];

    const button = document.createElement("button");
    button.textContent = `${t("machine")} ${m.number}`;

    const locked = counts[m.direction] >= directionLimits[m.direction];

    if (locked) {
      button.disabled = true;
      button.classList.add("locked");
    }

    button.onclick = function() {
      selectedMachine = m.number;
      selectedDirection = m.direction;
      setMessage("");

      document.querySelectorAll(".machine-column button").forEach(b => {
        b.classList.remove("selected");
        b.blur();
      });

      button.classList.add("selected");
      button.blur();
    };

    column.appendChild(label);
    column.appendChild(button);
    div.appendChild(column);
  });
}

function clearMachineSelectionVisuals() {
  document.querySelectorAll(".machine-column button").forEach(b => {
    b.classList.remove("selected");
    b.blur();
  });
}

function recordShot(result) {
  const shooter = shooters[currentShooterIndex];

  if (selectedMachine === null) {
    setMessage(t("selectMachineFirst"));
    return;
  }

  history.push({
    shooters: JSON.stringify(shooters),
    currentShooterIndex: currentShooterIndex
  });

  shooter.shots++;

  if (result === "Hit") shooter.hits++;
  if (result === "Miss") shooter.misses++;
  if (result === "Double") shooter.doubles++;

  shooter.targetCounts[shooter.station][selectedDirection]++;

  shooter.log.push({
    machine: selectedMachine,
    direction: selectedDirection,
    result: result,
    skipped: false
  });

  clearMachineSelectionVisuals();

  shooter.station++;
  if (shooter.station > 5) shooter.station = 1;

  currentShooterIndex++;
  if (currentShooterIndex >= shooters.length) currentShooterIndex = 0;

  updateDisplay();
}

function undoLastShot() {
  if (history.length === 0) {
    setMessage(t("noUndo"));
    return;
  }

  const last = history.pop();

  shooters = JSON.parse(last.shooters);
  originalOrder = shooters;
  currentShooterIndex = last.currentShooterIndex;

  updateDisplay();
}

function requestLeaveOrJoinShooter(index) {
  const shooter = originalOrder[index];

  if (shooter.away) {
    openConfirmModal(
      t("confirmJoinTitle"),
      t("confirmJoinMessage", {
        name: shooter.name,
        shot: Math.min(shooter.shots + 1, 25),
        station: shooter.station
      }),
      function() {
        history.push({
          shooters: JSON.stringify(shooters),
          currentShooterIndex: currentShooterIndex
        });

        shooter.away = false;
        closeModal();
        updateDisplay();
      }
    );
    return;
  }

  openConfirmModal(
    t("confirmLeaveTitle"),
    t("confirmLeaveMessage", { name: shooter.name }),
    function() {
      history.push({
        shooters: JSON.stringify(shooters),
        currentShooterIndex: currentShooterIndex
      });

      shooter.away = true;
      closeModal();
      updateDisplay();
    }
  );
}

function requestEndRound() {
  if (roundFullyComplete()) {
    endRound();
    return;
  }

  openConfirmModal(
    t("confirmEndTitle"),
    t("confirmEndMessage"),
    function() {
      closeModal();
      endRound();
    }
  );
}

function requestResetRound() {
  openConfirmModal(
    t("confirmResetTitle"),
    t("confirmResetMessage"),
    function() {
      closeModal();
      resetApp();
    }
  );
}

function openConfirmModal(title, message, onConfirm) {
  document.getElementById("editPreview").classList.add("hidden");
  document.getElementById("editPreview").innerHTML = "";

  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalMessage").textContent = message;

  document.getElementById("modalButtons").className = "modal-actions";
  document.getElementById("modalButtons").innerHTML = `
    <button class="cancel-button" onclick="closeModal()">${t("cancel")}</button>
    <button class="confirm-button" id="modalConfirmButton">${t("confirm")}</button>
  `;

  document.getElementById("modalConfirmButton").onclick = onConfirm;
  document.getElementById("modalBackdrop").classList.remove("hidden");
}

function openEditResultModal(shooterIndex, shotIndex) {
  editingShooterIndex = shooterIndex;
  editingShotIndex = shotIndex;

  const shooter = originalOrder[shooterIndex];

  document.getElementById("modalTitle").textContent = t("editResultTitle");
  document.getElementById("modalMessage").textContent =
    t("editResultMessage", { name: shooter.name, shot: shotIndex + 1 });

  document.getElementById("editPreview").classList.remove("hidden");
  document.getElementById("editPreview").innerHTML = makeSingleShooterPreview(shooter, shooterIndex, shotIndex);

  document.getElementById("modalButtons").className = "";
  document.getElementById("modalButtons").innerHTML = `
    <div class="modal-actions-edit">
      <button class="hit" onclick="changeShotResult('Hit')">/ ${t("hit")}</button>
      <button class="miss" onclick="changeShotResult('Miss')">○ ${t("miss")}</button>
      <button class="double" onclick="changeShotResult('Double')">• ${t("double")}</button>
    </div>
    <button class="cancel-button modal-cancel-full" onclick="closeModal()">${t("cancel")}</button>
  `;

  document.getElementById("modalBackdrop").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modalBackdrop").classList.add("hidden");
}

function changeShotResult(newResult) {
  const shooter = originalOrder[editingShooterIndex];

  if (!shooter || !shooter.log[editingShotIndex] || shooter.log[editingShotIndex].skipped) return;

  shooter.log[editingShotIndex].result = newResult;
  recalculateShooterStats(shooter);
  closeModal();
  endRound(true);
}

function recalculateShooterStats(shooter) {
  shooter.hits = 0;
  shooter.misses = 0;
  shooter.doubles = 0;

  shooter.log.forEach(entry => {
    if (entry.result === "Hit") shooter.hits++;
    if (entry.result === "Miss") shooter.misses++;
    if (entry.result === "Double") shooter.doubles++;
  });
}

function getSymbol(result) {
  if (result === "Hit") return `<span class="score-symbol hit-symbol">/</span>`;
  if (result === "Miss") return `<span class="score-symbol miss-symbol">○</span>`;
  if (result === "Double") return `<span class="score-symbol double-symbol">•</span>`;
  return `<span class="na-cell">N/A</span>`;
}

function makeShotCell(entry, shooterIndex, shotIndex, editable, highlight = false) {
  if (!entry) return `<span class="empty-scorecell"></span>`;

  if (entry.skipped) {
    return `
      <span class="scorecell na-cell ${highlight ? "highlight-shot" : ""}">
        N/A
      </span>
    `;
  }

  const click = editable ? `onclick="openEditResultModal(${shooterIndex}, ${shotIndex})"` : "";

  return `
    <span class="scorecell ${editable ? "editable-shot" : ""} ${highlight ? "highlight-shot" : ""}" ${click}>
      ${getSymbol(entry.result)}
      <span class="machine-number">${entry.machine}</span>
    </span>
  `;
}

function makeShotGroupsForShooter(s, shooterIndex, editable, highlightIndex = null) {
  let html = "";
  const groupsToShow = Math.ceil(s.log.length / 5);

  for (let group = 0; group < groupsToShow; group++) {
    html += `<div class="shot-group">`;

    for (let slot = 0; slot < 5; slot++) {
      const index = group * 5 + slot;
      html += makeShotCell(
        index < s.log.length ? s.log[index] : null,
        shooterIndex,
        index,
        editable,
        highlightIndex === index
      );
    }

    html += `</div>`;
  }

  return html || t("noMachineData");
}

function makeSingleShooterPreview(shooter, shooterIndex, highlightIndex) {
  const html = makeShotGroupsForShooter(shooter, shooterIndex, false, highlightIndex);

  return `
    <table>
      <thead>
        <tr>
          <th>${currentLanguage === "zh" ? "运动员" : "Shooter"}</th>
          <th>${t("scoresheet")}</th>
          <th>${t("score")}</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>
            <strong>${shooter.name}</strong>
            <span class="station-subtitle">(${t("station")} ${shooter.startStation})</span>
          </td>
          <td>${html}</td>
          <td><strong>${shooter.hits + shooter.doubles}</strong></td>
        </tr>
      </tbody>
    </table>
  `;
}

function makeScoresheet(title, includeRoundInfo, editable = false) {
  let rows = "";

  originalOrder.forEach((s, shooterIndex) => {
    const html = makeShotGroupsForShooter(s, shooterIndex, editable);

    rows += `
      <tr>
        <td>
          <strong>${s.name}</strong>
          <span class="station-subtitle">(${t("station")} ${s.startStation})</span>
          ${s.away ? `<span class="away-label">${t("away")}</span>` : ""}
        </td>
        <td class="scoresheet-cell">${html}</td>
        <td><strong>${s.hits + s.doubles}</strong></td>
      </tr>
    `;
  });

  const roundInfo = includeRoundInfo ? `
    <div class="round-info">
      <div><strong>${t("started")}:</strong> ${formatDateTime(roundStartTime)}</div>
      <div><strong>${t("ended")}:</strong> ${formatDateTime(roundEndTime)}</div>
    </div>
  ` : "";

  return `
    <div class="log-section">
      ${title ? `<h2>${title}</h2>` : ""}
      ${roundInfo}
      <div class="scoresheet-wrap">
        <table>
          <thead>
            <tr>
              <th>${currentLanguage === "zh" ? "运动员" : "Shooter"}</th>
              <th>${t("scoresheet")}</th>
              <th>${t("score")}</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function makeLiveSingleRow(s, shooterIndex) {
  return `
    <table>
      <tbody>
        <tr>
          <td>
            <strong>${s.name}</strong>
            <span class="station-subtitle">(${t("station")} ${s.startStation})</span>
            ${s.away ? `<span class="away-label">${t("away")}</span>` : ""}
          </td>
          <td class="scoresheet-cell">
            ${makeShotGroupsForShooter(s, shooterIndex, false)}
          </td>
          <td><strong>${s.hits + s.doubles}</strong></td>
        </tr>
      </tbody>
    </table>
  `;
}

function updateLogs() {
  let rowsHtml = "";

  originalOrder.forEach((s, shooterIndex) => {
    rowsHtml += `
      <div class="live-row-wrap">
        <div class="live-row-table">
          ${makeLiveSingleRow(s, shooterIndex)}
        </div>

        <div class="live-action-cell">
          <button class="live-action-button ${s.away ? "join-button" : "leave-button"}" onclick="requestLeaveOrJoinShooter(${shooterIndex})">
            ${s.away ? t("joinShooter") : t("leaveShooter")}
          </button>
        </div>
      </div>
    `;
  });

  document.getElementById("allLogs").innerHTML = `
    <div class="live-board-area">
      <h2>${t("scoresheet")}</h2>

      <div class="live-board-inner">
        <div class="live-header">
          <div class="live-row-table">
            <table>
              <thead>
                <tr>
                  <th>${currentLanguage === "zh" ? "运动员" : "Shooter"}</th>
                  <th>${t("scoresheet")}</th>
                  <th>${t("score")}</th>
                </tr>
              </thead>
            </table>
          </div>
          <div class="live-header-spacer"></div>
        </div>

        ${rowsHtml}
      </div>
    </div>
  `;
}

function makeFinalSymbolSummary(s) {
  return `
    <div class="final-symbol-row">
      <div class="final-symbol-item">
        <span class="score-symbol hit-symbol">/</span>
        ${t("hits")}: ${s.hits}
      </div>
      <div class="final-symbol-item">
        <span class="score-symbol miss-symbol">○</span>
        ${t("misses")}: ${s.misses}
      </div>
      <div class="final-symbol-item">
        <span class="score-symbol double-symbol">•</span>
        ${t("doubles")}: ${s.doubles}
      </div>
    </div>
  `;
}

function getRateClass(rate) {
  if (rate < 0.2) return "rate-good";
  if (rate < 0.5) return "rate-warning";
  return "rate-bad";
}

function buildAnalysisData(log, missRule) {
  const directionData = {
    Left: { misses: 0, total: 0 },
    Straight: { misses: 0, total: 0 },
    Right: { misses: 0, total: 0 }
  };

  const machineData = {};

  for (let i = 1; i <= 15; i++) {
    machineData[i] = { misses: 0, total: 0 };
  }

  log.forEach(entry => {
    if (entry.skipped) return;

    directionData[entry.direction].total++;
    machineData[entry.machine].total++;

    if (missRule(entry)) {
      directionData[entry.direction].misses++;
      machineData[entry.machine].misses++;
    }
  });

  return { directionData, machineData };
}

function makeDirectionRows(directionData) {
  return directionOrder.map(direction => {
    const data = directionData[direction];
    const rate = data.total === 0 ? 0 : data.misses / data.total;
    const percent = Math.round(rate * 100);

    return `
      <div class="analysis-row ${getRateClass(rate)}">
        <span>${directionText(direction)}</span>
        <span>${data.misses}/${data.total} ${t("missed")}, ${percent}%</span>
      </div>
    `;
  }).join("");
}

function makeMachineChip(machine, data) {
  const rate = data.total === 0 ? 0 : data.misses / data.total;
  const percent = Math.round(rate * 100);

  return `
    <span class="machine-chip ${getRateClass(rate)}">
      ${machine}: ${data.misses}/${data.total}, ${percent}%
    </span>
  `;
}

function makeMachineRows(machineData) {
  let html = "";

  for (let station = 1; station <= 5; station++) {
    const machines = stationMachines[station].map(m => m.number);

    html += `<div class="machine-station-row">`;

    machines.forEach(machine => {
      html += makeMachineChip(machine, machineData[machine]);
    });

    html += `</div>`;
  }

  return html;
}

function makeAnalysisSection(title, data) {
  return `
    <p class="analysis-title">${title}</p>
    <div class="analysis-subtitle">${t("directions")}</div>
    <div class="analysis-grid">
      ${makeDirectionRows(data.directionData)}
    </div>
    <div class="analysis-subtitle machine-analysis-title">${t("machines")}</div>
    ${makeMachineRows(data.machineData)}
  `;
}

function makeShooterAnalysis(s) {
  const hasDoubles = s.doubles > 0;

  const regular = buildAnalysisData(
    s.log,
    entry => entry.result === "Miss"
  );

  const singleShot = buildAnalysisData(
    s.log,
    entry => entry.result === "Miss" || entry.result === "Double"
  );

  if (!hasDoubles) {
    return `
      <div class="analysis-box">
        ${makeAnalysisSection(t("singleShotAnalysis"), singleShot)}
      </div>
    `;
  }

  return `
    <div class="analysis-box">
      ${makeAnalysisSection(t("analysis"), regular)}

      <hr class="analysis-divider">

      ${makeAnalysisSection(t("singleShotAnalysis"), singleShot)}
    </div>
  `;
}

function endRound(keepExistingEndTime = false) {
  if (!roundEndTime || !keepExistingEndTime) {
    roundEndTime = new Date();
  }

  closeModal();

  document.getElementById("scoreArea").classList.add("hidden");
  document.getElementById("finalPage").classList.remove("hidden");

  document.getElementById("finalLogs").innerHTML = makeScoresheet("", true, true);

  let html = "";

  originalOrder.forEach(s => {
    const percentage = Math.round(((s.hits + s.doubles) / 25) * 100);

    html += `
      <div class="final-card">
        <h3>${s.name}</h3>
        <p><strong>${t("startingStation")} </strong>${s.startStation}</p>
        <p><strong>${t("finalScore")}:</strong> ${s.hits + s.doubles}/25 (${percentage}%)</p>
        ${makeFinalSymbolSummary(s)}
        ${makeShooterAnalysis(s)}
      </div>
    `;
  });

  document.getElementById("finalResults").innerHTML = html;
}

async function exportScoresheetImage() {
  const element = document.getElementById("finalLogs");

  const canvas = await html2canvas(element, {
    backgroundColor: "#ffffff",
    scale: 3
  });

  const dataUrl = canvas.toDataURL("image/png");
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

  if (isIOS) {
    const newWindow = window.open();
    newWindow.document.write(`
      <html>
        <body style="margin:0; background:white;">
          <img src="${dataUrl}" style="width:100%; height:auto;">
          <p style="font-family:Arial; padding:12px;">
            ${t("savePhotoTip")}
          </p>
        </body>
      </html>
    `);
    newWindow.document.close();
  } else {
    const link = document.createElement("a");
    link.download = "olympic-trap-scoresheet.png";
    link.href = dataUrl;
    link.click();
  }
}

function resetApp() {
  savedNames = [];
  shooters = [];
  originalOrder = [];
  currentShooterIndex = 0;
  selectedMachine = null;
  selectedDirection = null;
  history = [];
  roundStartTime = null;
  roundEndTime = null;

  const count = Number(document.getElementById("shooterCount").value) || 1;

  for (let i = 0; i < count; i++) {
    savedNames[i] = defaultNamePrefix();
  }

  document.getElementById("finalPage").classList.add("hidden");
  document.getElementById("scoreArea").classList.add("hidden");
  document.getElementById("setup").classList.remove("hidden");

  createShooterInputs(false);
}

applyLanguage();
createShooterInputs(false);
</script>
